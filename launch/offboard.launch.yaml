launch:
  - arg:
      name: 'buffer_size'
      default: '10'
  - arg:
      name: 'position_tolerance'
      default: '1.0'
  - arg:
      name: 'max_speed'
      default: '2.0'
  - arg:
      name: 'kP'
      default: '1.0'
  - arg:
      name: 'alt'
      default: '-1.0'
  - arg:
      name: 'x_takeoff'
      default: '1.0'
  - arg:
      name: 'y_takeoff'
      default: '1.0'
  - arg:
      name: 'robot_id'
      default: '1'
  - arg:
      name: 'env_scale_factor'
      default: '4.0'
  - arg:
      name: 'world_size'
      default: '1024.0'
  - arg:
      name: 'fence_x_buf_l'
      default: '10.0'
  - arg:
      name: 'fence_x_buf_r'
      default: '10.0'
  - arg:
      name: 'fence_y_buf_b'
      default: '10.0'
  - arg:
      name: 'fence_y_buf_t'
      default: '10.0'
  - arg:
      name: 'land_vel_z'
      default: '0.5'
  - arg:
      name: 'stationary_thresh'
      default: '0.1'
  - arg:
      name: 'landing_offset_y'
      default: '2.0'
  - arg:
      name: 'debug'
      default: 'false'
  - arg:
      name: 'px4_timeout'
      default: '15.0'

  - node:
      pkg: 'starling_offboard_cpp'
      exec: 'starling_offboard_cpp'
      name: 'starling_offboard_cpp'
      param:
        - name: 'robot_id'
          value: '$(var robot_id)'
        - name: 'alt'
          value: '$(var alt)'
        - name: 'x_takeoff'
          value: '$(var x_takeoff)'
        - name: 'y_takeoff'
          value: '$(var y_takeoff)'
        - name: 'env_scale_factor'
          value: '$(var env_scale_factor)'
        - name: 'buffer_size'
          value: '$(var buffer_size)'
        - name: 'position_tolerance'
          value: '$(var position_tolerance)'
        - name: 'max_speed'
          value: '$(var max_speed)'
        - name: 'kP'
          value: '$(var kP)'
        - name: 'world_size'
          value: '$(var world_size)'
        - name: 'fence_x_buf_l'
          value: '$(var fence_x_buf_l)'
        - name: 'fence_x_buf_r'
          value: '$(var fence_x_buf_r)'
        - name: 'fence_y_buf_b'
          value: '$(var fence_y_buf_b)'
        - name: 'fence_y_buf_t'
          value: '$(var fence_y_buf_t)'
        - name: 'land_vel_z'
          value: '$(var land_vel_z)'
        - name: 'stationary_thresh'
          value: '$(var stationary_thresh)'
        - name: 'landing_offset_y'
          value: '$(var landing_offset_y)'
        - name: 'debug'
          value: '$(var debug)'
        - name: 'px4_timeout'
          value: '$(var px4_timeout)'
